name = "gitbuck-rewire"
main = "src/worker.js"
compatibility_date = "2026-04-27"
workers_dev = true
preview_urls = false

[vars]
SITE_ORIGIN = "https://starbuck100.github.io"
OPENROUTER_MODEL = "deepseek/deepseek-v4-pro"
OPENROUTER_FALLBACK_MODEL = "deepseek/deepseek-chat"
SERVA_TIMEOUT_MS = "55000"
SERVA_GENERATE_ASSETS = "false"

[[kv_namespaces]]
binding = "GITBUCK_GENERATIONS"
id = "85bb472df53e41aaa46d253f618fb618"
